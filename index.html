<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Il mio Emulatore GBA</title>
    <style>
        body { font-family: sans-serif; background: #222; color: white; text-align: center; }
        #screen { background: #000; border: 4px solid #555; width: 480px; height: 320px; }
        .controls { margin-top: 20px; }
    </style>
</head>
<body>

    <h1>GBA Emulator Project</h1>
    
    <canvas id="screen" width="240" height="160"></canvas>

    <div class="controls">
        <p>Carica il BIOS e la ROM per iniziare:</p>
        <label>BIOS (.bin): </label>
        <input type="file" id="biosInput" accept=".bin"><br><br>
        <label>ROM (.gba): </label>
        <input type="file" id="romInput" accept=".gba">
    </div>

    <script>
        // Riferimenti agli elementi HTML
        const canvas = document.getElementById('screen');
        const ctx = canvas.getContext('2d');
        
        let biosData = null;
        let romData = null;

        // Funzione per leggere i file binari
        function loadFile(event, callback) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                callback(new Uint8Array(e.target.result));
                console.log("File caricato con successo!");
            };
            reader.readAsArrayBuffer(file);
        }

        // Gestori eventi per il caricamento
        document.getElementById('biosInput').onchange = (e) => {
            loadFile(e, (data) => { biosData = data; checkReady(); });
        };

        document.getElementById('romInput').onchange = (e) => {
            loadFile(e, (data) => { romData = data; checkReady(); });
        };

        function checkReady() {
            if (biosData && romData) {
                alert("BIOS e ROM pronti! Inizio inizializzazione...");
                startEmulator();
            }
        }

        function startEmulator() {
            // Qui andrebbe la logica della CPU ARM7TDMI
            // Per ora disegnamo un rettangolo di test per confermare che il canvas funziona
            ctx.fillStyle = "green";
            ctx.fillText("Emulatore Inizializzato!", 50, 80);
            
            console.log("Dati BIOS (primi 10 byte):", biosData.slice(0, 10));
        }
    </script>
</body>
</html>
