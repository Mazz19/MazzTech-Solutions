<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBA Partner - Pokémon Master Edition</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .emulator-card { background: #1e1e1e; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 2px solid #3498db; width: 90%; max-width: 600px; text-align: center; }
        #game-container { width: 100%; aspect-ratio: 3 / 2; background: #000; border-radius: 10px; margin: 20px 0; overflow: hidden; position: relative; }
        .controls-hint { font-size: 0.8em; color: #888; background: #252525; padding: 10px; border-radius: 10px; margin-top: 10px; }
        h1 { margin: 0; color: #3498db; font-size: 1.5em; }
        .badge { background: #2ecc71; color: #000; padding: 2px 8px; border-radius: 5px; font-size: 0.7em; vertical-align: middle; font-weight: bold; }
    </style>
</head>
<body>

    <div class="emulator-card">
        <h1>GBA Partner <span class="badge">PRO CORE</span></h1>
        <p style="font-size: 0.9em; color: #bbb;">GitHub Pages Detected: mGBA Core Armato 🚀</p>

        <div id="game-container">
            <div id="game"></div>
        </div>

        <div class="controls-hint">
            ⌨️ <b>Tasti:</b> Frecce (Movimento) | Z (A) | X (B) | Invio (Start) | Shift (Select)
        </div>
    </div>

    <script>
        // Configurazione per il caricamento professionale
        window.EJS_player = '#game';
        window.EJS_core = 'gba'; 
        window.EJS_startOnLoaded = false; // Aspetta che l'utente scelga la ROM
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        window.EJS_gameUrl = ''; // Verrà popolato al caricamento del file
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

    <p style="margin-top: 20px; font-size: 0.8em; color: #555;">Design by Gemini AI • EmulatorJS Integration</p>
</body>
</html>
