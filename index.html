<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>GBA Partner Emulator v18.0 - Final Stand</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: #eee; text-align: center; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #2c3e50; padding: 25px; border-radius: 20px; border: 4px solid #3498db; }
        #screen { background: #000; border: 8px solid #34495e; border-radius: 5px; width: 480px; height: 320px; image-rendering: pixelated; margin: 15px 0; cursor: pointer; }
        .btn { background: #3498db; color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1em; }
        .status { margin-bottom: 15px; font-weight: bold; color: #2ecc71; }
        #instructions { font-size: 0.9em; color: #bdc3c7; margin-top: 20px; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="container">
        <h1>GBA Partner Emulator v18.0</h1>
        <div class="status" id="status">SISTEMA PRONTO - NESSUN SERVER RICHIESTO</div>

        <canvas id="screen" width="240" height="160"></canvas>
        
        <div>
            <input type="file" id="rom-upload" accept=".gba" style="display:none">
            <button class="btn" onclick="document.getElementById('rom-upload').click()">📂 CARICA POKÉMON E GIOCA</button>
        </div>

        <div id="instructions">
            <b>Comandi Tastiera:</b><br>
            Frecce: Movimento | Z: Tasto A | X: Tasto B<br>
            Invio: Start | Shift: Select
        </div>
    </div>

    <script src="https://unpkg.com/@neoface/gba-js/dist/gba.js"></script>
    
    <script>
        const canvas = document.getElementById('screen');
        const status = document.getElementById('status');
        let gba;

        try {
            gba = new window.VBAJS(); // Utilizza un engine integrato più stabile
            gba.setCanvas(canvas);
        } catch(e) {
            status.innerText = "ERRORE INIZIALIZZAZIONE ENGINE";
            status.style.color = "#e74c3c";
        }

        document.getElementById('rom-upload').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    status.innerText = "CARICAMENTO POKÉMON...";
                    gba.loadRom(event.target.result);
                    gba.start();
                    status.innerText = "GIOCO IN ESECUZIONE 🎮";
                } catch(err) {
                    status.innerText = "ERRORE NEL CARICAMENTO DELLA ROM";
                    status.style.color = "#e74c3c";
                }
            };
            reader.readAsArrayBuffer(file);
        };
    </script>
</body>
</html>
